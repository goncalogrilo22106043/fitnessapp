services:
  postgres:
    image: postgres:16-alpine
    container_name: rotina-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: rotina
      POSTGRES_USER: rotina
      POSTGRES_PASSWORD: rotina_dev_password
    ports:
      - "5432:5432"
    volumes:
      - rotina-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rotina -d rotina"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  rotina-postgres-data:
